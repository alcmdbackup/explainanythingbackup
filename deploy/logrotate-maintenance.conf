# Logrotate config for maintenance skill logs.
# Install: cp deploy/logrotate-maintenance.conf /etc/logrotate.d/maintenance-scheduler
/home/ac/Documents/ac/explainanything-worktree0/logs/maintenance/*.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 644 ac ac
}
