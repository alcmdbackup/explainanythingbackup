# Weekly batch evolution runner.
# Claims pending evolution runs and executes the full pipeline with tournament ranking.

name: Evolution Batch

on:
  schedule:
    # Monday 4am UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      max-runs:
        description: 'Maximum runs to process'
        default: '10'
        type: string
      parallel:
        description: 'Number of runs to execute in parallel'
        default: '5'
        type: string
      dry-run:
        description: 'Dry run (no LLM calls or DB writes)'
        default: false
        type: boolean

concurrency:
  group: evolution-batch
  cancel-in-progress: false

jobs:
  run-evolution:
    name: Run Evolution Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 420 # 7 hours
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript check
        run: npx tsc --noEmit

      - name: Run evolution batch
        run: |
          ARGS=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          MAX="${{ inputs.max-runs || '10' }}"
          PARALLEL="${{ inputs.parallel || '5' }}"
          npx tsx scripts/evolution-runner.ts $ARGS --max-runs "$MAX" --parallel "$PARALLEL"

  # Dry-run validation on PRs that touch evolution code
  validate:
    name: Validate Evolution Runner
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check runner script
        run: npx tsc --noEmit
