name: E2E Nightly (Production)

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 45

    # Sequential browser execution to avoid OpenAI rate limiting.
    # Both hostnames served by the single Vercel project (Option B of the
    # explainanything/evolution website split) get smoked nightly: the public
    # host runs @critical, the evolution host runs @evolution.
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        browser: [chromium, firefox]
        site:
          - name: public
            base_url: https://explainanything.vercel.app
            grep_filter: '@critical'
          - name: evolution
            # Update when PROD_EVOLUTION_HOST in src/config/hostnames.ts changes.
            base_url: https://ea-evolution.vercel.app
            grep_filter: '@evolution'

    env:
      # Per-matrix BASE_URL so each row hits the right hostname.
      BASE_URL: ${{ matrix.site.base_url }}

      # Production secrets
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX_NAME_ALL: ${{ secrets.PINECONE_INDEX_NAME_ALL }}
      PINECONE_NAMESPACE: ${{ secrets.PINECONE_NAMESPACE }}

      NEXT_PUBLIC_USE_AI_API_ROUTE: 'true'

      # Vercel bypass for protected deployments
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      # Test user credentials
      TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      # NO E2E_TEST_MODE - uses real AI

    steps:
      - uses: actions/checkout@v4
        with:
          ref: production  # Checkout production branch to match deployed code

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-${{ matrix.browser }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright deps (when cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Seed admin test user
        run: npx tsx scripts/seed-admin-test-user.ts

      - name: Health Check (${{ matrix.site.name }}, with retry)
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          DEPLOY_URL: ${{ matrix.site.base_url }}
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=10

          health_check() {
            if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
              curl -s -L --max-redirs 5 --connect-timeout 10 --max-time 30 \
                -o /tmp/health.json -w '%{http_code}' \
                -c /tmp/cookies.txt -b /tmp/cookies.txt \
                -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
                -H "x-vercel-set-bypass-cookie: samesitenone" \
                "$DEPLOY_URL/api/health"
            else
              curl -s -L --max-redirs 5 --connect-timeout 10 --max-time 30 \
                -o /tmp/health.json -w '%{http_code}' "$DEPLOY_URL/api/health"
            fi
          }

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Health check attempt $attempt/$MAX_RETRIES: $DEPLOY_URL/api/health"
            http_code=$(health_check)

            if [ "$http_code" = "403" ]; then
              echo "::error::Deployment protection blocked (403) on ${{ matrix.site.name }}. Check VERCEL_AUTOMATION_BYPASS_SECRET."
              exit 1
            elif [ "$http_code" = "200" ]; then
              response=$(cat /tmp/health.json)
              status=$(echo "$response" | jq -r '.status')
              echo "$response" | jq .
              if [ "$status" = "healthy" ]; then
                echo "::notice::Health check passed for ${{ matrix.site.name }} on attempt $attempt!"
                exit 0
              fi
            fi

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $attempt failed (HTTP $http_code), retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "::error::Health check failed for ${{ matrix.site.name }} after $MAX_RETRIES attempts"
          cat /tmp/health.json 2>/dev/null || echo "(No response body)"
          exit 1

      - name: Audit @skip-prod tags (BLOCKING)
        run: |
          # BLOCKING pre-flight check: ensure @skip-prod tags exist where expected
          # Tests requiring mocks MUST have this tag or they'll fail in production
          echo "Checking for @skip-prod tags in mock-dependent test files..."
          missing=0

          # Use find to handle glob expansion properly
          # Checks: error tests (2) + AI suggestion tests (4) + status-pill + host-isolation = 8 total
          for file in $(find src/__tests__/e2e/specs -name "errors.spec.ts" \
            -o -name "error-recovery.spec.ts" \
            -o -name "editor-integration.spec.ts" \
            -o -name "content-boundaries.spec.ts" \
            -o -name "state-management.spec.ts" \
            -o -name "save-blocking.spec.ts" \
            -o -name "status-pill.spec.ts" \
            -o -name "host-isolation.spec.ts" 2>/dev/null); do
            if grep -q "@skip-prod" "$file"; then
              echo "✓ $file has @skip-prod tag"
            else
              echo "::error::BLOCKING: $file missing @skip-prod tag"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing files missing @skip-prod tags. These tests will fail in production!"
            echo "Add { tag: '@skip-prod' } to tests that require mocked APIs."
            exit 1
          fi
          echo "All mock-dependent test files have @skip-prod tags"

      - name: Run E2E Tests (${{ matrix.site.name }}, ${{ matrix.browser }})
        # Per-site grep filter: public → @critical, evolution → @evolution.
        # Belt-and-suspenders: --grep-invert="@skip-prod" stays so mock-dependent
        # tests are skipped regardless of which branch's playwright.config.ts is checked out.
        run: |
          echo "Running ${{ matrix.site.grep_filter }} tests against ${{ matrix.site.name }}: $BASE_URL"
          npx playwright test --project=${{ matrix.browser }} \
            --grep="${{ matrix.site.grep_filter }}" \
            --grep-invert="@skip-prod"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.site.name }}-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Notify Slack on failure
        # Alert on failure OR on cancelled IF the run was unattended (scheduled), not a
        # manual workflow_dispatch cancel during dev. Avoids re-creating the channel-noise
        # problem that caused the 62-day silent outage.
        if: failure() || (cancelled() && github.event_name == 'schedule')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "::error::Nightly E2E tests failed for ${{ matrix.site.name }} (${{ matrix.browser }})!"
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "blocks": [
                  {
                    "type": "header",
                    "text": {"type": "plain_text", "text": "🚨 Nightly E2E Tests Failed (${{ matrix.site.name }})", "emoji": true}
                  },
                  {
                    "type": "section",
                    "fields": [
                      {"type": "mrkdwn", "text": "*Site:*\n${{ matrix.site.name }}"},
                      {"type": "mrkdwn", "text": "*Browser:*\n${{ matrix.browser }}"},
                      {"type": "mrkdwn", "text": "*URL:*\n${{ matrix.site.base_url }}"},
                      {"type": "mrkdwn", "text": "*Filter:*\n${{ matrix.site.grep_filter }}"}
                    ]
                  },
                  {
                    "type": "section",
                    "text": {"type": "mrkdwn", "text": "*Actions Run:*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"}
                  }
                ]
              }' "$SLACK_WEBHOOK_URL"
          fi

  # Auto-file a release-health GitHub issue on nightly failure. Defends against
  # the Slack-channel-unread "attention problem" diagnosed at environments.md:85.
  # Runs once after the matrix completes (needs: [e2e]) — `max-parallel: 1` on
  # the matrix means rows can't race this step.
  notify-release-health:
    needs: [e2e]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release-health label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Idempotent — first run creates, subsequent runs no-op
        run: gh label create release-health --color FFA500 --description "Nightly/post-deploy health alerts" --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Find or create release-health issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          # Pass via env: to avoid GitHub Actions script-injection antipattern
          # of interpolating ${{ }} directly into bash heredocs / scripts.
          WORKFLOW_NAME: ${{ github.workflow }}
          REF_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          TODAY=$(date -u +%F)
          TITLE="[release-health] Nightly E2E failed — ${TODAY}"
          # Use label + created:DATE filter for the lookup; em-dash in the title
          # would be treated specially by `in:title` substring search.
          EXISTING=$(gh issue list \
            --repo "$REPO" \
            --label release-health \
            --state open \
            --search "created:${TODAY}" \
            --json number,title \
            --jq "[.[] | select(.title == \"${TITLE}\")][0].number // empty")
          BODY=$(cat <<EOF
          Run: ${RUN_URL}
          Workflow: ${WORKFLOW_NAME} on ${REF_NAME}

          Failing matrix rows visible in the run page. Triage steps: docs/docs_overall/debugging.md
          EOF
          )
          if [ -n "${EXISTING}" ]; then
            gh issue comment "${EXISTING}" --repo "$REPO" --body "Failure recurred: ${RUN_URL}"
          else
            gh issue create --repo "$REPO" --title "${TITLE}" --body "${BODY}" --label release-health
          fi
