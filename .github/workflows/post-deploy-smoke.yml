name: Post-Deploy Smoke Tests

# Fires on every push to the production branch (Vercel deploys prod on this push) —
# the reliable prod-deploy signal. deployment_status is kept only as a (currently
# inert) secondary: GitHub anti-recursion drops the GITHUB_TOKEN-created Vercel
# deployment status, so it never triggers a workflow run today. workflow_dispatch
# allows manual smoke runs.
on:
  push:
    branches: [production]
  workflow_dispatch:
  deployment_status:

concurrency:
  group: post-deploy-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke-test:
    # Use Production environment to access PROD_TEST_USER_* secrets
    environment: Production
    timeout-minutes: 20
    # push:[production] / manual dispatch always proceed (the Health Check step below
    # polls until the apex deploy is live). The deployment_status path keeps its original
    # prod+vercel.app guard for the day GitHub stops anti-recursion-dropping the event.
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
        github.event.deployment_status.state == 'success' &&
        github.event.deployment.environment == 'Production' &&
        contains(github.event.deployment_status.target_url, 'vercel.app'))
    runs-on: ubuntu-latest

    # Smoke each Vercel hostname served by this single project. Both hostnames
    # point at the same deployment (Option B of the explainanything/evolution
    # website split — see docs/planning/split_evolution_explainanythig_into_separate_websites_20260522/),
    # so the deployment_status event fires once but we must verify each host.
    strategy:
      fail-fast: false
      matrix:
        site:
          - name: public
            # Pin to the canonical apex hostname. deployment_status.target_url is a
            # per-deploy preview URL (e.g. explainanything-<hash>-<scope>.vercel.app)
            # which middleware classifyHost() does NOT recognize → 404s everything
            # except /api/health. The apex is what real user traffic hits, and Vercel
            # promotes apex within seconds of a Production deploy succeeding.
            base_url: https://explainanything.vercel.app
            spec: src/__tests__/e2e/specs/smoke.public.spec.ts
            grep: '@smoke-public'
          - name: evolution
            # Evolution-host smoke. Update this when PROD_EVOLUTION_HOST in
            # src/config/hostnames.ts changes.
            base_url: https://ea-evolution.vercel.app
            spec: src/__tests__/e2e/specs/smoke.evolution.spec.ts
            grep: '@smoke-evolution'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: production

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Health Check (${{ matrix.site.name }})
        id: health
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          DEPLOY_URL: ${{ matrix.site.base_url }}
        run: |
          echo "Polling health at: $DEPLOY_URL/api/health (site=${{ matrix.site.name }})"
          # push:[production] fires immediately, BEFORE Vercel finishes building, so poll
          # the apex /api/health until the new deploy is live (~5 min budget) instead of
          # checking once. Limitation: confirms the apex is healthy, not that THIS commit
          # is live — acceptable for a smoke gate. Follow-up: poll a /api/health SHA field.
          MAX_RETRIES=15
          RETRY_DELAY=20

          check_once() {
            if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
              curl -s -L --max-redirs 5 --connect-timeout 10 --max-time 30 \
                -o /tmp/health.json -w '%{http_code}' \
                -c /tmp/cookies.txt -b /tmp/cookies.txt \
                -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
                -H "x-vercel-set-bypass-cookie: samesitenone" \
                "$DEPLOY_URL/api/health"
            else
              curl -s -L --max-redirs 5 --connect-timeout 10 --max-time 30 \
                -o /tmp/health.json -w '%{http_code}' "$DEPLOY_URL/api/health"
            fi
          }

          for attempt in $(seq 1 $MAX_RETRIES); do
            http_code=$(check_once || echo "000")

            # Protection misconfig is fatal immediately — retrying won't help.
            if [ "$http_code" = "403" ]; then
              echo "::error::Deployment protection blocked request (403) for ${{ matrix.site.name }}. Check VERCEL_AUTOMATION_BYPASS_SECRET."
              exit 1
            fi

            if [ "$http_code" = "200" ]; then
              response=$(cat /tmp/health.json)
              if status=$(echo "$response" | jq -r '.status' 2>/dev/null) && [ "$status" = "healthy" ]; then
                echo "Health check response (${{ matrix.site.name }}):"
                echo "$response" | jq .
                echo "::notice::Health check passed for ${{ matrix.site.name }} on attempt $attempt!"
                exit 0
              fi
            fi

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "Attempt $attempt/$MAX_RETRIES: HTTP $http_code (waiting for deploy to go live), retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          echo "::error::Health check failed for ${{ matrix.site.name }} after $MAX_RETRIES attempts (~$((MAX_RETRIES * RETRY_DELAY))s)"
          cat /tmp/health.json 2>/dev/null || echo "(No response body)"
          exit 1

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Smoke Tests (${{ matrix.site.name }})
        env:
          BASE_URL: ${{ matrix.site.base_url }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Running smoke tests against ${{ matrix.site.name }}: $BASE_URL"
          echo "Spec: ${{ matrix.site.spec }} | Grep: ${{ matrix.site.grep }}"

          # Guard against silent zero-test passes: if the grep matches nothing in the
          # target spec (e.g. tag typo), Playwright exits 0 with "no tests found" and
          # the smoke check is meaningless. List first, count, fail loud if zero.
          # Playwright --list emits lines like "  [chromium] › specs/foo.spec.ts:7:7 › test name".
          # Match the spec-path:line:col pattern that appears on every test line and
          # nowhere else in the output (no false positives on the trailing "Total: N" line).
          test_count=$(npx playwright test --project=chromium \
            --grep="${{ matrix.site.grep }}" \
            ${{ matrix.site.spec }} \
            --list 2>&1 | grep -cE '\.spec\.ts:[0-9]+:[0-9]+' || true)

          if [ "$test_count" -eq 0 ]; then
            echo "::error::Zero tests matched grep='${{ matrix.site.grep }}' in spec='${{ matrix.site.spec }}'. Did a tag get renamed or removed? Refusing to silently pass."
            exit 1
          fi
          echo "Discovered $test_count smoke test(s) for ${{ matrix.site.name }}; running…"

          npx playwright test --project=chromium \
            --grep="${{ matrix.site.grep }}" \
            ${{ matrix.site.spec }} \
            --reporter=list

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results-${{ matrix.site.name }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Notify Slack on failure
        # Alert on failure OR on cancelled IF the run was an unattended prod-deploy event
        # (push to production, or a real deployment_status) vs an intentional manual
        # workflow_dispatch cancel during dev. Avoids re-spamming the channel that went
        # unread during the 62-day silent outage.
        if: failure() || (cancelled() && (github.event_name == 'push' || github.event_name == 'deployment_status'))
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "::error::Post-deployment smoke tests failed for ${{ matrix.site.name }} (${{ matrix.site.base_url }})"

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "🚨 Production Smoke Tests Failed (${{ matrix.site.name }})",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Site:*\n${{ matrix.site.name }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*URL:*\n<${{ matrix.site.base_url }}|View Site>"
                      }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Actions Run:*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    }
                  }
                ]
              }' \
              "$SLACK_WEBHOOK_URL"
          else
            echo "::warning::SLACK_WEBHOOK_URL not configured - skipping Slack notification"
          fi
