name: Post-Deploy Smoke Tests

# Triggers when Vercel completes a deployment
on:
  deployment_status:

jobs:
  smoke-test:
    # Use Production environment to access PROD_TEST_USER_* secrets
    environment: Production
    timeout-minutes: 15
    # Only run on successful Vercel deployments to production
    # Filter out GitHub Actions environment deployments (which have GitHub URLs as target_url)
    if: |
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production' &&
      contains(github.event.deployment_status.target_url, 'vercel.app')
    runs-on: ubuntu-latest

    # Smoke each Vercel hostname served by this single project. Both hostnames
    # point at the same deployment (Option B of the explainanything/evolution
    # website split — see docs/planning/split_evolution_explainanythig_into_separate_websites_20260522/),
    # so the deployment_status event fires once but we must verify each host.
    strategy:
      fail-fast: false
      matrix:
        site:
          - name: public
            base_url: ${{ github.event.deployment_status.target_url }}
          - name: evolution
            # Evolution-host smoke. Update this when PROD_EVOLUTION_HOST in
            # src/config/hostnames.ts changes.
            base_url: https://ea-evolution.vercel.app

    steps:
      - uses: actions/checkout@v4
        with:
          ref: production

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Wait for deployment to stabilize
        run: sleep 10

      - name: Health Check (${{ matrix.site.name }})
        id: health
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          DEPLOY_URL: ${{ matrix.site.base_url }}
        run: |
          echo "Checking health at: $DEPLOY_URL/api/health (site=${{ matrix.site.name }})"

          # Add bypass header for protected deployments
          # Use -L to follow redirects (Vercel returns 307 with Set-Cookie, then redirects)
          # Use -c/-b to handle cookies across redirects
          # Use --max-redirs to prevent infinite redirect loops
          # Use --connect-timeout and --max-time to prevent hangs
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            http_code=$(curl -s -L --max-redirs 5 --connect-timeout 10 --max-time 30 \
              -o /tmp/health.json -w '%{http_code}' \
              -c /tmp/cookies.txt -b /tmp/cookies.txt \
              -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
              -H "x-vercel-set-bypass-cookie: samesitenone" \
              "$DEPLOY_URL/api/health")
          else
            http_code=$(curl -s -L --max-redirs 5 --connect-timeout 10 --max-time 30 \
              -o /tmp/health.json -w '%{http_code}' "$DEPLOY_URL/api/health")
          fi

          # Handle all non-200 status codes (use = for POSIX compliance)
          if [ "$http_code" = "403" ]; then
            echo "::error::Deployment protection blocked request (403) for ${{ matrix.site.name }}. Check VERCEL_AUTOMATION_BYPASS_SECRET."
            exit 1
          elif [ "$http_code" != "200" ]; then
            echo "::error::Health check returned HTTP $http_code for ${{ matrix.site.name }}"
            cat /tmp/health.json 2>/dev/null || echo "(No response body)"
            exit 1
          fi

          # Add jq error handling
          response=$(cat /tmp/health.json)
          if ! status=$(echo "$response" | jq -r '.status' 2>/dev/null); then
            echo "::error::Failed to parse health check JSON response"
            echo "Response body:"
            cat /tmp/health.json
            exit 1
          fi

          echo "Health check response (${{ matrix.site.name }}):"
          echo "$response" | jq .

          if [ "$status" != "healthy" ]; then
            echo "::error::Health check failed for ${{ matrix.site.name }} - status: $status"
            exit 1
          fi

          echo "::notice::Health check passed for ${{ matrix.site.name }}!"

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Smoke Tests (${{ matrix.site.name }})
        env:
          BASE_URL: ${{ matrix.site.base_url }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_ID: ${{ secrets.TEST_USER_ID }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Running smoke tests against ${{ matrix.site.name }}: $BASE_URL"
          npx playwright test --project=chromium --grep="@smoke" --reporter=list

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results-${{ matrix.site.name }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "::error::Post-deployment smoke tests failed for ${{ matrix.site.name }} (${{ matrix.site.base_url }})"

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "🚨 Production Smoke Tests Failed (${{ matrix.site.name }})",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      {
                        "type": "mrkdwn",
                        "text": "*Site:*\n${{ matrix.site.name }}"
                      },
                      {
                        "type": "mrkdwn",
                        "text": "*URL:*\n<${{ matrix.site.base_url }}|View Site>"
                      }
                    ]
                  },
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Actions Run:*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                    }
                  }
                ]
              }' \
              "$SLACK_WEBHOOK_URL"
          else
            echo "::warning::SLACK_WEBHOOK_URL not configured - skipping Slack notification"
          fi
