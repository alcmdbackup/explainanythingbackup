# Deploy Supabase migrations
# Mirrors the normal git flow:
# - Push to main → deploy to Staging Supabase
# - Push to production → deploy to Production Supabase
#
# ROLLBACK: If a migration fails or causes issues:
# 1. Supabase migrations are NOT automatically rolled back
# 2. You must manually fix via SQL in the dashboard
# 3. Each migration file should have a rollback comment at the top
# 4. See docs/planning/RLS_evaluation_prod_20260104/RLS_evaluation_prod_planning.md for rollback examples

name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'supabase/migrations/**'
  # Pull-request trigger exists ONLY so the `lint-migrations-idempotent` job can
  # gate PRs before merge (deploy jobs gate on `github.event_name == 'push'`).
  pull_request:
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:  # Manual trigger
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - both

jobs:
  # Migration idempotency lint. Catches non-idempotent DDL (bare CREATE TABLE,
  # ADD CONSTRAINT without DROP IF EXISTS, etc.) that would silently abort the
  # entire deploy queue. The May 2026 prod-schema drift was caused by exactly
  # this gap. Runs ONLY on pull_request events so it gates merge (not after merge,
  # where origin/main == HEAD and the diff would be empty).
  #
  # Rollout: BLOCKING (required check) as of analyzing_migration_behavior_20260528.
  # Warn-only mode ended once the in-flight backlog drained; the lint only scans
  # newly-added migration files, so the legacy backlog does not trip it.
  # Emergency bypass: apply the `migration-lint-bypass` label to the PR.
  lint-migrations-idempotent:
    name: Lint migrations (idempotency)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git diff against base branch
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        # BLOCKING: a non-idempotent newly-added migration fails this required check.
        # (Was warn-only during the backlog-drain window; flipped early — safe because
        # the lint scans only newly-added files via git diff --diff-filter=A.)
        # Bypass path: if the PR has the `migration-lint-bypass` label, exit 0 with a warning.
        # Bypass requires admin reviewer per CODEOWNERS (acceptable per plan rev iter-3 minor:
        # GitHub branch protection does not cover PR-label add/remove, so this is a soft
        # control gated on social convention + post-incident follow-up to retrofit guards).
        run: |
          if [ "${{ contains(github.event.pull_request.labels.*.name, 'migration-lint-bypass') }}" = "true" ]; then
            echo "::warning::migration-lint-bypass label present — skipping lint. FOLLOW-UP REQUIRED: retrofit idempotency guards in a follow-up PR."
            exit 0
          fi
          # On pull_request, github.base_ref is the target branch (e.g. 'main' or 'production').
          # Fetch it explicitly so origin/$base_ref is current for the diff.
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF" --depth=1
          npx tsx scripts/lint-migrations-idempotent.ts --base="origin/$BASE_REF"

  # Blocking timestamp-order + duplicate-version check. Replaces the retired
  # auto-rename workflow (migration-reorder.yml): fails the PR with a manual `git mv`
  # instruction instead of silently rewriting filenames. Runs on both main- and
  # production-targeted PRs. Mark REQUIRED in branch protection.
  check-migration-order:
    name: Check migration order
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so base tip + diff resolve
      - name: Check timestamp order + duplicate versions
        run: |
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF" --depth=50
          bash scripts/check-migration-order.sh --base="origin/$BASE_REF"

  # Blocking append-only check: shipped migrations must not be edited in place (silent
  # no-op on already-applied envs -> drift). Per-file `@migration-edit-approved` marker
  # or the `migration-edit-approved` PR label bypasses. Mark REQUIRED in branch protection.
  check-migration-append-only:
    name: Check migrations append-only
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for in-place edits to shipped migrations
        run: |
          if [ "${{ contains(github.event.pull_request.labels.*.name, 'migration-edit-approved') }}" = "true" ]; then
            echo "::warning::migration-edit-approved label present — skipping append-only check."
            exit 0
          fi
          BASE_REF="${{ github.base_ref }}"
          git fetch origin "$BASE_REF" --depth=50
          bash scripts/check-migration-append-only.sh --base="origin/$BASE_REF"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    # Run on: push to main, or manual with staging/both
    if: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'both')) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to staging project
        run: supabase link --project-ref ifubinffdbyewoezcidz
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Show pending migrations
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Repair orphaned remote migrations
        run: |
          # Remote migrations whose local files were deleted (e.g., evolution cleanup)
          # must be marked as "reverted" so db push doesn't complain about missing files.
          REMOTE_VERSIONS=$(supabase migration list 2>&1 \
            | grep '|' \
            | awk -F'|' '{print $2}' \
            | grep -oE '[0-9]{14}' \
            | sort -u)
          LOCAL_VERSIONS=$(ls supabase/migrations/*.sql 2>/dev/null \
            | xargs -I{} basename {} \
            | grep -oE '^[0-9]{14}' \
            | sort -u)
          ORPHANS=$(comm -23 <(echo "$REMOTE_VERSIONS") <(echo "$LOCAL_VERSIONS") || true)
          if [ -n "$ORPHANS" ]; then
            echo "Repairing orphaned remote migrations:"
            echo "$ORPHANS"
            # shellcheck disable=SC2086
            supabase migration repair --status reverted $ORPHANS
          else
            echo "No orphaned migrations to repair"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Preview pending migrations (dry run)
        run: supabase db push --include-all --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations to staging
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify migration status
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: Production
    # Run on: push to production, or manual with production/both
    if: ${{ github.ref == 'refs/heads/production' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.environment == 'production' || github.event.inputs.environment == 'both')) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to production project
        run: supabase link --project-ref qbxhivoezkfbjbsctdzo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Show pending migrations
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Repair orphaned and duplicate remote migrations
        run: |
          # Two problems this step solves:
          #
          # 1. ORPHANED: timestamps exist in remote history but not in local files
          #    (legacy renames from the now-retired auto-rename workflow, deleted
          #    migrations, or hotfixes applied directly).
          #    Fix: mark them as "reverted" so db push doesn't complain.
          #
          # 2. DUPLICATES: Both original and CI-renamed migrations exist locally
          #    with the same filename suffix (e.g. _fix_hall_of_fame_upsert_index.sql).
          #    If the CI-renamed version is already applied on remote, the original
          #    must be marked "applied" to prevent db push from re-running DDL that
          #    was already applied by the CI-renamed equivalent.

          REMOTE_VERSIONS=$(supabase migration list 2>&1 \
            | grep '|' \
            | awk -F'|' '{print $2}' \
            | grep -oE '[0-9]{14}' \
            | sort -u)
          LOCAL_VERSIONS=$(ls supabase/migrations/*.sql 2>/dev/null \
            | xargs -I{} basename {} \
            | grep -oE '^[0-9]{14}' \
            | sort -u)

          # --- Fix 1: Revert orphaned remote versions ---
          ORPHANS=$(comm -23 <(echo "$REMOTE_VERSIONS") <(echo "$LOCAL_VERSIONS") || true)
          if [ -n "$ORPHANS" ]; then
            echo "Repairing orphaned remote migrations:"
            echo "$ORPHANS"
            # shellcheck disable=SC2086
            supabase migration repair --status reverted $ORPHANS
          else
            echo "No orphaned migrations to repair"
          fi

          # --- Fix 2: Mark originals as applied when CI-renamed duplicate already ran ---
          # Build suffix→timestamps map from local files
          declare -A SUFFIX_TO_TIMESTAMPS
          for f in supabase/migrations/*.sql; do
            base=$(basename "$f")
            ts=$(echo "$base" | grep -oE '^[0-9]{14}')
            suffix=$(echo "$base" | sed 's/^[0-9]*_//')
            SUFFIX_TO_TIMESTAMPS["$suffix"]+="$ts "
          done

          MARK_APPLIED=""
          for suffix in "${!SUFFIX_TO_TIMESTAMPS[@]}"; do
            timestamps=(${SUFFIX_TO_TIMESTAMPS[$suffix]})
            # Only process suffixes with duplicate timestamps
            if [ ${#timestamps[@]} -le 1 ]; then
              continue
            fi
            # Check if any timestamp for this suffix is already in remote
            has_remote=""
            for ts in "${timestamps[@]}"; do
              if echo "$REMOTE_VERSIONS" | grep -q "^${ts}$"; then
                has_remote="$ts"
                break
              fi
            done
            # If one version is already applied remotely, mark the others as applied
            if [ -n "$has_remote" ]; then
              for ts in "${timestamps[@]}"; do
                if [ "$ts" != "$has_remote" ] && ! echo "$REMOTE_VERSIONS" | grep -q "^${ts}$"; then
                  MARK_APPLIED+="$ts "
                fi
              done
            fi
          done

          if [ -n "$MARK_APPLIED" ]; then
            echo "Marking duplicate migrations as applied (CI-renamed equivalents already ran):"
            echo "$MARK_APPLIED"
            # shellcheck disable=SC2086
            supabase migration repair --status applied $MARK_APPLIED
          else
            echo "No duplicate migrations to mark as applied"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Preview pending migrations (dry run)
        run: supabase db push --include-all --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations to production
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify migration status
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
